<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Upload Your Photos</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <h1>Welcome back!</h1>
    <p id="guestGreeting"></p>
    <p id="checkoutInfo" style="font-size: 0.9em; color: #666;"></p>

    <hr />

    <form id="uploadForm" enctype="multipart/form-data">
      <label for="photo">Upload your photos</label>
      <input type="file" name="photo" id="photo" multiple required />
      <button type="submit">Upload</button>
    </form>

    <hr />

    <p><a id="smartHomeLink" href="#">Go to your Smart Home Controls</a></p>

    <hr />

    <h3>Link Another Device</h3>
    <p style="font-size: 0.9em;">Want to access this session from another phone, tablet, or computer?</p>
    <button id="generateLinkCode">Generate Device Link Code</button>
    <div id="linkCodeDisplay" style="margin-top: 10px; padding: 10px; background: #f0f0f0; display: none;">
      <strong>Share this code:</strong> <span id="linkCode" style="font-size: 1.5em; font-family: monospace;"></span>
      <p style="font-size: 0.8em; margin-top: 5px;">Enter this code on your other device to link it. Code expires in 30 minutes.</p>
    </div>

    <hr />

    <p><a href="#" id="reset">If you're not <span id="guestName"></span>, click here to register</a></p>
  </div>

  <script>
    // Load background image if set
    fetch('/admin-api/background').then(res => res.json()).then(data => {
      if (data.backgroundImage) {
        document.body.style.backgroundImage = `url('${data.backgroundImage}')`;
        document.body.style.backgroundSize = 'cover';
        document.body.style.backgroundPosition = 'center';
        document.body.style.backgroundRepeat = 'no-repeat';
        document.body.style.backgroundAttachment = 'fixed';
      }
    }).catch(() => {});

    const guestData = JSON.parse(localStorage.getItem('guestData')) || {};
    const guestToken = localStorage.getItem('guestToken');
    const greeting = document.getElementById('guestGreeting');
    const smartHomeLink = document.getElementById('smartHomeLink');
    const guestNameSpan = document.getElementById('guestName');
    const checkoutInfo = document.getElementById('checkoutInfo');

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    if (guestData.name && guestData.room) {
      greeting.innerHTML = `Welcome back ${escapeHtml(guestData.name)}! You're staying in <strong>${escapeHtml(guestData.room)}</strong>.`;
      smartHomeLink.href = guestData.dashboardUrl || "/";
      guestNameSpan.textContent = guestData.name;

      // Show checkout date if available
      if (guestData.checkoutDate) {
        const checkout = new Date(guestData.checkoutDate);
        const daysLeft = Math.ceil((checkout - new Date()) / (1000 * 60 * 60 * 24));
        checkoutInfo.innerHTML = `Your session is active until <strong>${checkout.toLocaleDateString()}</strong> (${daysLeft} days remaining)`;
      }
    } else {
      window.location.href = "index.html";
    }

    // Photo upload
    document.getElementById('uploadForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const formData = new FormData();
      const files = document.getElementById('photo').files;
      for (let i = 0; i < files.length; i++) formData.append('photos', files[i]);
      if (guestData.name) formData.append('guestName', guestData.name);
      if (guestData.id) formData.append('guestId', guestData.id);
      const res = await fetch('/upload', { method: 'POST', body: formData });
      alert(res.ok ? 'Photos uploaded successfully!' : 'Upload failed.');
    });

    // Reset/logout
    document.getElementById('reset').addEventListener('click', function (e) {
      e.preventDefault();
      localStorage.removeItem('guestData');
      localStorage.removeItem('guestToken');
      window.location.href = 'index.html';
    });

    // Generate device link code
    document.getElementById('generateLinkCode').addEventListener('click', async () => {
      if (!guestToken) {
        alert("Your session doesn't support device linking. Please register again.");
        return;
      }

      try {
        const res = await fetch('/guest/link-code', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token: guestToken })
        });

        if (res.ok) {
          const result = await res.json();
          document.getElementById('linkCode').textContent = result.code;
          document.getElementById('linkCodeDisplay').style.display = 'block';
        } else {
          alert("Unable to generate link code. Please try again.");
        }
      } catch (err) {
        alert("Error: " + err.message);
      }
    });
  </script>
</body>
</html>
