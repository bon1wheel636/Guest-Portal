<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Upload Your Photos</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
<hr />
<p>
  <button id="generateCode">Generate Session Code</button>
  <span id="codeDisplay" style="font-weight:bold;"></span>
</p>

    <h1>Welcome back!</h1>
    <p id="guestGreeting"></p>
    <form id="uploadForm" enctype="multipart/form-data">
      <label for="photo">Upload your photos</label>
      <input type="file" name="photo" id="photo" multiple required />
      <button type="submit">Upload</button>
    </form>
    <p><a id="smartHomeLink" href="#">Go to your Smart Home Controls</a></p>
    <p><a href="#" id="reset">If you're not <span id="guestName"></span>, click here to register</a></p>
  </div>
  <script>
    const guestData = JSON.parse(localStorage.getItem('guestData')) || {};
    const greeting = document.getElementById('guestGreeting');
    const smartHomeLink = document.getElementById('smartHomeLink');
    const guestNameSpan = document.getElementById('guestName');
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    if (guestData.name && guestData.room) {
      greeting.innerHTML = `Welcome back ${escapeHtml(guestData.name)}! Are you staying in the ${escapeHtml(guestData.room)} again or <a href='index.html'>change</a>?`;
      smartHomeLink.href = guestData.dashboardUrl || "/";
      guestNameSpan.textContent = guestData.name;
    if (guestData.name && guestData.room) {
      greeting.innerHTML = `Welcome back ${guestData.name}! Are you staying in the ${guestData.room} again or <a href='index.html'>change</a>?`;
      smartHomeLink.href = guestData.dashboardUrl || "/";
      guestNameSpan.innerText = guestData.name;
    } else window.location.href = "index.html";
    document.getElementById('uploadForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const formData = new FormData();
      const files = document.getElementById('photo').files;
      for (let i = 0; i < files.length; i++) formData.append('photos', files[i]);
      if (guestData.name) formData.append('guestName', guestData.name);
      const res = await fetch('/upload', { method: 'POST', body: formData });
      alert(res.ok ? 'Photos uploaded successfully!' : 'Upload failed.');
    });
    document.getElementById('reset').addEventListener('click', function (e) {
      e.preventDefault();
      localStorage.removeItem('guestData');
      window.location.href = 'index.html';
    });
  
document.getElementById('generateCode').addEventListener('click', async () => {
  const res = await fetch('/session', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name: guestData.name, room: guestData.room })
  });
  if (res.ok) {
    const result = await res.json();
    document.getElementById('codeDisplay').innerText = 'Code: ' + result.code;
  } else {
    alert("Unable to generate code");
  }
});
</script>
</body>
</html>
