<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Photos</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <nav class="guest-nav" aria-label="Guest pages">
      <a href="welcome.html" class="guest-nav-link">Welcome</a>
      <a href="photo.html" class="guest-nav-link active" aria-current="page">My Photos</a>
    </nav>

    <h1>My Photos</h1>
    <p id="guestGreeting"></p>
    <p id="checkoutInfo" class="guest-muted"></p>

    <section class="guest-section">
      <div id="galleryStatus" class="guest-muted">Loading your uploads...</div>
      <nav id="galleryEventTabs" class="guest-event-tabs" aria-label="Browse by event" hidden></nav>
      <div id="galleryGroups"></div>
      <p><a href="welcome.html">Upload photos &amp; files on the Welcome page</a></p>
    </section>

    <p class="guest-footer"><a href="#" id="reset">If you're not <span id="guestName"></span>, click here to register</a></p>
  </div>

  <script>
    fetch('/guest/background').then(res => res.json()).then(data => {
      if (data.backgroundImage) {
        document.body.style.backgroundImage = `url('${data.backgroundImage}')`;
        document.body.style.backgroundSize = 'cover';
        document.body.style.backgroundPosition = 'center';
        document.body.style.backgroundRepeat = 'no-repeat';
        document.body.style.backgroundAttachment = 'fixed';
      }
    }).catch(() => {});

    let guestData = JSON.parse(localStorage.getItem('guestData')) || {};
    const guestToken = localStorage.getItem('guestToken');
    let permissions = guestData.permissions || {};
    let availableEvents = [];
    let galleryFiles = [];
    let activeEventFilter = 'all';
    const guestNameSpan = document.getElementById('guestName');
    const greeting = document.getElementById('guestGreeting');
    const checkoutInfo = document.getElementById('checkoutInfo');
    const galleryStatus = document.getElementById('galleryStatus');
    const galleryEventTabs = document.getElementById('galleryEventTabs');
    const galleryGroups = document.getElementById('galleryGroups');
    const previewUrls = [];

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function formatBytes(bytes) {
      if (bytes === 0) return '0 B';
      const units = ['B', 'KB', 'MB', 'GB'];
      const i = Math.floor(Math.log(bytes) / Math.log(1024));
      return (bytes / Math.pow(1024, i)).toFixed(i > 0 ? 1 : 0) + ' ' + units[i];
    }

    function fileExtension(name) {
      const index = name.lastIndexOf('.');
      return index >= 0 ? name.substring(index).toLowerCase() : '';
    }

    function isImageFile(name) {
      return ['.jpg', '.jpeg', '.png', '.gif', '.webp', '.heic', '.heif'].includes(fileExtension(name));
    }

    function revokePreviewUrls() {
      previewUrls.forEach(url => URL.revokeObjectURL(url));
      previewUrls.length = 0;
    }

    function guestUploadPath(file) {
      const slug = file.eventSlug || 'General';
      return `/guest/uploads/${encodeURIComponent(slug)}/${encodeURIComponent(file.name)}`;
    }

    async function fetchGuestFile(file) {
      const res = await fetch(guestUploadPath(file), {
        headers: { 'X-Guest-Token': guestToken }
      });
      if (!res.ok) {
        throw new Error(`Unable to load ${file.name}`);
      }
      return res.blob();
    }

    function groupFilesByEvent(files) {
      const groups = new Map();
      files.forEach(file => {
        const eventName = file.event || 'General';
        if (!groups.has(eventName)) {
          groups.set(eventName, []);
        }
        groups.get(eventName).push(file);
      });
      return groups;
    }

    function renderEventTabs(files) {
      const groups = groupFilesByEvent(files);
      galleryEventTabs.innerHTML = '';

      if (groups.size <= 1) {
        galleryEventTabs.hidden = true;
        return;
      }

      galleryEventTabs.hidden = false;
      const tabDefs = [{ key: 'all', label: 'All events', count: files.length }];
      [...groups.entries()]
        .sort((a, b) => a[0].localeCompare(b[0]))
        .forEach(([eventName, eventFiles]) => {
          tabDefs.push({ key: eventName, label: eventName, count: eventFiles.length });
        });

      tabDefs.forEach(tab => {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'guest-event-tab';
        button.setAttribute('role', 'tab');
        button.dataset.event = tab.key;
        button.setAttribute('aria-selected', tab.key === activeEventFilter ? 'true' : 'false');
        if (tab.key === activeEventFilter) {
          button.classList.add('active');
        }
        button.textContent = `${tab.label} (${tab.count})`;
        button.addEventListener('click', () => {
          activeEventFilter = tab.key;
          renderEventTabs(galleryFiles);
          renderGallery(galleryFiles);
        });
        galleryEventTabs.appendChild(button);
      });
    }

    function filesForActiveFilter(files) {
      if (activeEventFilter === 'all') {
        return files;
      }
      return files.filter(file => (file.event || 'General') === activeEventFilter);
    }

    async function loadAvailableEvents() {
      if (!permissions.tagPhotosToEvent) {
        return;
      }
      try {
        const res = await fetch('/guest/events');
        if (!res.ok) {
          return;
        }
        availableEvents = await res.json();
      } catch (err) {
        console.error('Failed to load events:', err);
      }
    }

    function buildRetagOptions(currentEventName) {
      const options = [];
      availableEvents.forEach(event => {
        if (event.name !== currentEventName) {
          options.push({ value: event.id, label: event.name });
        }
      });
      if (permissions.createEventNames) {
        options.push({ value: '__new__', label: 'New event…' });
      }
      return options;
    }

    async function retagUpload(file, targetEventId, newEventName) {
      const body = targetEventId === '__new__'
        ? { eventName: newEventName }
        : { eventId: targetEventId };
      const res = await fetch(guestUploadPath(file), {
        method: 'PATCH',
        headers: {
          'Content-Type': 'application/json',
          'X-Guest-Token': guestToken
        },
        body: JSON.stringify(body)
      });
      if (!res.ok) {
        throw new Error(await res.text() || `HTTP ${res.status}`);
      }
      return res.json();
    }

    async function renderGallery(files) {
      revokePreviewUrls();
      galleryGroups.innerHTML = '';

      if (files.length === 0) {
        galleryStatus.textContent = 'No uploads yet. Add photos or files from the Welcome page.';
        galleryEventTabs.hidden = true;
        return;
      }

      renderEventTabs(files);
      const visibleFiles = filesForActiveFilter(files);
      const filterLabel = activeEventFilter === 'all' ? '' : ` in ${activeEventFilter}`;
      galleryStatus.textContent = `${visibleFiles.length} file${visibleFiles.length === 1 ? '' : 's'}${filterLabel} uploaded during your stay.`;

      if (visibleFiles.length === 0) {
        galleryGroups.innerHTML = '<p class="guest-muted">No uploads in this event yet.</p>';
        return;
      }

      const groups = groupFilesByEvent(visibleFiles);
      const showGroupHeadings = activeEventFilter === 'all' && groups.size > 1;

      for (const [eventName, eventFiles] of groups.entries()) {
        const section = document.createElement('section');
        section.className = 'guest-gallery-group';
        if (showGroupHeadings) {
          section.innerHTML = `<h2>${escapeHtml(eventName)}</h2>`;
        }
        const list = document.createElement('ul');
        list.className = 'guest-gallery';

        for (const file of eventFiles) {
          const item = document.createElement('li');
          item.className = 'guest-gallery-item';
          item.dataset.filename = file.name;
          item.dataset.event = file.event || 'General';

          const preview = document.createElement('div');
          preview.className = 'guest-gallery-preview';

          if (isImageFile(file.name)) {
            try {
              const blob = await fetchGuestFile(file);
              const url = URL.createObjectURL(blob);
              previewUrls.push(url);
              const img = document.createElement('img');
              img.src = url;
              img.alt = file.name;
              preview.appendChild(img);
            } catch (err) {
              preview.textContent = 'Preview unavailable';
            }
          } else {
            preview.textContent = fileExtension(file.name).toUpperCase().replace('.', '') || 'FILE';
          }

          const meta = document.createElement('div');
          meta.className = 'guest-gallery-meta';
          const eventBadge = showGroupHeadings
            ? ''
            : `<span class="guest-event-badge">${escapeHtml(file.event || 'General')}</span><br>`;
          meta.innerHTML = `${eventBadge}<strong>${escapeHtml(file.name)}</strong><br><span class="guest-muted">${formatBytes(file.size)}</span>`;

          const actions = document.createElement('div');
          actions.className = 'guest-gallery-actions';

          const downloadBtn = document.createElement('button');
          downloadBtn.type = 'button';
          downloadBtn.className = 'btn-secondary';
          downloadBtn.textContent = 'Download';
          downloadBtn.addEventListener('click', async () => {
            try {
              const blob = await fetchGuestFile(file);
              const url = URL.createObjectURL(blob);
              const link = document.createElement('a');
              link.href = url;
              link.download = file.name;
              link.click();
              URL.revokeObjectURL(url);
            } catch (err) {
              alert(err.message);
            }
          });

          actions.appendChild(downloadBtn);

          if (permissions.tagPhotosToEvent) {
            const retagOptions = buildRetagOptions(file.event || 'General');
            if (retagOptions.length > 0) {
              const moveWrap = document.createElement('fieldset');
              moveWrap.className = 'guest-gallery-move';

              const legend = document.createElement('legend');
              legend.textContent = 'Move to event';
              moveWrap.appendChild(legend);

              const selectId = `retag-${file.eventSlug || 'General'}-${file.name}`.replace(/[^a-zA-Z0-9_-]/g, '-');
              const selectLabel = document.createElement('label');
              selectLabel.className = 'guest-field-label';
              selectLabel.setAttribute('for', selectId);
              selectLabel.textContent = 'Choose event';

              const select = document.createElement('select');
              select.id = selectId;
              select.className = 'guest-retag-select';
              retagOptions.forEach(option => {
                const opt = document.createElement('option');
                opt.value = option.value;
                opt.textContent = option.label;
                select.appendChild(opt);
              });

              const newEventInput = document.createElement('input');
              newEventInput.type = 'text';
              newEventInput.className = 'guest-retag-new';
              newEventInput.placeholder = 'New event name';
              newEventInput.maxLength = 100;
              newEventInput.setAttribute('aria-label', 'New event name');
              newEventInput.hidden = select.value !== '__new__';

              select.addEventListener('change', () => {
                newEventInput.hidden = select.value !== '__new__';
              });

              const moveBtn = document.createElement('button');
              moveBtn.type = 'button';
              moveBtn.className = 'btn-secondary';
              moveBtn.textContent = 'Move file';
              moveBtn.addEventListener('click', async () => {
                if (select.value === '__new__' && !newEventInput.value.trim()) {
                  alert('Enter a name for the new event.');
                  newEventInput.focus();
                  return;
                }
                moveBtn.disabled = true;
                select.disabled = true;
                try {
                  await retagUpload(file, select.value, newEventInput.value.trim());
                  await loadAvailableEvents();
                  await loadGallery();
                } catch (err) {
                  alert('Move failed: ' + err.message);
                  moveBtn.disabled = false;
                  select.disabled = false;
                }
              });

              moveWrap.appendChild(selectLabel);
              moveWrap.appendChild(select);
              moveWrap.appendChild(newEventInput);
              moveWrap.appendChild(moveBtn);
              actions.appendChild(moveWrap);
            }
          }

          if (permissions.deleteOwnPhotos) {
            const deleteBtn = document.createElement('button');
            deleteBtn.type = 'button';
            deleteBtn.className = 'btn-danger-inline';
            deleteBtn.textContent = 'Delete';
            deleteBtn.addEventListener('click', async () => {
              if (!confirm(`Delete ${file.name}? This cannot be undone.`)) {
                return;
              }

              deleteBtn.disabled = true;
              try {
                const res = await fetch(guestUploadPath(file), {
                  method: 'DELETE',
                  headers: { 'X-Guest-Token': guestToken }
                });
                if (!res.ok) {
                  throw new Error(await res.text() || `HTTP ${res.status}`);
                }
                await loadGallery();
              } catch (err) {
                alert('Delete failed: ' + err.message);
                deleteBtn.disabled = false;
              }
            });
            actions.appendChild(deleteBtn);
          }

          item.appendChild(preview);
          item.appendChild(meta);
          item.appendChild(actions);
          list.appendChild(item);
        }

        section.appendChild(list);
        galleryGroups.appendChild(section);
      }
    }

    async function loadGallery() {
      if (!guestToken) {
        galleryStatus.textContent = 'Please register again to view your uploads.';
        return;
      }

      galleryStatus.textContent = 'Loading your uploads...';
      try {
        const res = await fetch('/guest/uploads', {
          headers: { 'X-Guest-Token': guestToken }
        });
        if (res.status === 403) {
          window.location.href = 'welcome.html';
          return;
        }
        if (!res.ok) {
          throw new Error(await res.text() || `HTTP ${res.status}`);
        }
        const data = await res.json();
        galleryFiles = data.files || [];
        if (activeEventFilter !== 'all') {
          const stillVisible = galleryFiles.some(file => (file.event || 'General') === activeEventFilter);
          if (!stillVisible) {
            activeEventFilter = 'all';
          }
        }
        await renderGallery(galleryFiles);
      } catch (err) {
        galleryStatus.textContent = 'Unable to load uploads: ' + err.message;
      }
    }

    async function initPhotoPage() {
      if (!guestData.name) {
        window.location.href = 'index.html';
        return;
      }

      if (guestToken) {
        try {
          const res = await fetch('/guest/validate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token: guestToken })
          });
          if (res.ok) {
            const data = await res.json();
            if (data.valid) {
              guestData = data.guest;
              permissions = guestData.permissions || {};
              localStorage.setItem('guestData', JSON.stringify(guestData));
            }
          }
        } catch (err) {
          console.error('Token validation failed:', err);
        }
      }

      if (!permissions.viewPhotoGallery) {
        window.location.href = 'welcome.html';
        return;
      }

      await loadAvailableEvents();

      greeting.innerHTML = guestData.room
        ? `Photos for <strong>${escapeHtml(guestData.name)}</strong> — room <strong>${escapeHtml(guestData.room)}</strong>.`
        : `Photos for <strong>${escapeHtml(guestData.name)}</strong>.`;
      if (guestData.eventName) {
        greeting.innerHTML += `<br><span class="guest-muted">Registered event: <strong>${escapeHtml(guestData.eventName)}</strong></span>`;
      }
      guestNameSpan.textContent = guestData.name;

      if (guestData.checkoutDate) {
        const checkout = new Date(guestData.checkoutDate);
        const isDayVisit = guestData.visitMode === 'day';
        const remainingMs = checkout - new Date();
        if (isDayVisit) {
          const hoursLeft = Math.max(1, Math.ceil(remainingMs / (1000 * 60 * 60)));
          checkoutInfo.innerHTML = `Your session is active until <strong>${checkout.toLocaleString()}</strong> (${hoursLeft} hour${hoursLeft === 1 ? '' : 's'} remaining)`;
        } else {
          const daysLeft = Math.ceil(remainingMs / (1000 * 60 * 60 * 24));
          checkoutInfo.innerHTML = `Your session is active until <strong>${checkout.toLocaleDateString()}</strong> (${daysLeft} days remaining)`;
        }
      }

      loadGallery();
    }

    document.getElementById('reset').addEventListener('click', function (e) {
      e.preventDefault();
      revokePreviewUrls();
      localStorage.removeItem('guestData');
      localStorage.removeItem('guestToken');
      sessionStorage.removeItem('welcomeSeen');
      sessionStorage.removeItem('tutorialSeen');
      sessionStorage.removeItem('showTutorial');
      sessionStorage.removeItem('guestArrival');
      window.location.href = 'index.html';
    });

    window.addEventListener('pagehide', revokePreviewUrls);
    initPhotoPage();
  </script>
</body>
</html>
